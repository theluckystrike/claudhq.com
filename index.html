<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="Browse 30+ proven Claude prompt templates for coding, writing, analysis, and business. Search, filter, copy, and save your favorites instantly.">
  <meta property="og:title" content="ClaudHQ — Claude Prompt Library">
  <meta property="og:description" content="30+ ready-to-use Claude prompt templates. Search, filter, and copy with one click.">

  <link rel="canonical" href="https://claudhq.com/">
  <link rel="stylesheet" href="assets/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ClaudHQ Prompt Library",
    "url": "https://claudhq.com",
    "description": "Searchable library of 30+ Claude prompt templates organized by category with copy-to-clipboard and favorites.",

    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }

<body>
  <nav>
    <a href="/" class="brand">ClaudHQ</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>

    Built by <a href="https://zovo.one">zovo.one</a> &middot; More tools: <a href="https://claudflow.com">ClaudFlow</a>, <a href="https://claudkit.com">ClaudKit</a>
